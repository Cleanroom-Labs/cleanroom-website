name: Docs
# trigger: needs_extra_options/links revert (e5016d4)
on:
  push:
    branches: [main]
    paths:
      - 'technical-docs/**'
      - 'scripts/**'
      - '.github/workflows/build-all-docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'technical-docs/**'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz
      - name: Install Python dependencies
        run: |
          cd technical-docs
          pip install -r requirements.txt
      - name: Build all documentation
        env:
          DOCS_VERSION: dev
        run: |
          cd technical-docs
          make html
      - name: Check for build warnings
        run: |
          cd technical-docs
          make html-check
      - name: Copy built docs to public directory
        run: |
          echo "Copying built documentation to public/docs/dev/..."

          mkdir -p public/docs/dev
          cp -r technical-docs/build/html/* public/docs/dev/

          echo "Documentation copied to public/docs/dev/"
      - name: Verify build output
        run: |
          echo "## Build Output Verification"
          echo ""

          if [ ! -f public/docs/dev/index.html ]; then
            echo "ERROR: Master index.html not found"
            exit 1
          fi

          echo "Built documentation structure:"
          tree -L 2 public/docs || ls -la public/docs

          echo ""
          echo "Build verification complete"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: public/docs
          retention-days: 7
      - name: Generate build summary
        run: |
          echo "# 📚 Documentation Build Summary"
          echo ""
          echo "✓ All documentation built successfully"
          echo ""
          echo "## Projects Built"
          echo "- Cleanroom Whisper"
          echo "- AirGap Deploy"
          echo "- AirGap Transfer"
          echo "- Master documentation"
          echo ""
          echo "## Output"
          echo "Built documentation available in artifacts (retention: 30 days)"
  validate-pdf-config:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Download built documentation
        uses: actions/download-artifact@v4
        with:
          name: documentation
          path: public/docs
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pytest beautifulsoup4 python-frontmatter markdown
      - name: Validate PDF config against built docs
        run: pytest scripts/generate-pdf/tests/ -v -m integration

  bearer:
    name: SAST scan (Bearer)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Scan source code (SARIF)
        run: |
          docker run --rm \
            -v "${PWD}:/repo" \
            bearer/bearer:latest \
            scan /repo --format sarif --output /repo/bearer.sarif
      - name: Upload Bearer SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bearer.sarif
          category: bearer-source
      - name: Enforce Bearer findings policy
        run: |
          FINDINGS=$(jq '[.runs[].results[]? | select(.level == "error" or .level == "warning")] | length' bearer.sarif)
          echo "Bearer findings (warning/error): ${FINDINGS}"
          if [ "${FINDINGS}" -gt 0 ]; then
            echo "::error::Bearer reported security findings."
            exit 1
          fi

  trivy:
    name: Vulnerability scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Scan filesystem (SARIF)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          exit-code: '0'
      - name: Upload filesystem SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-fs.sarif'
          category: 'trivy-filesystem'
      - name: Scan filesystem for vulnerabilities
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '1'

  semgrep:
    name: SAST scan (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install Semgrep
        run: pip install semgrep
      - name: Scan source code (SARIF)
        run: semgrep scan --config p/security-audit --sarif --output semgrep.sarif .
      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-source
      - name: Scan source code (blocking)
        run: semgrep scan --config p/security-audit --error .
